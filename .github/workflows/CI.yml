name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, ubuntu-20.04 ]
        build_type: [ Debug, Release ]
        compiler:
          - { cc: gcc, cxx: g++ }
          - { cc: clang, cxx: clang++ }
        sanitizer: [ "", "Address", "Leak", "Thread", "Undefined" ]

        exclude:
          - os: macos-latest
            compiler: { cc: gcc, cxx: g++ }
          - compiler: { cc: gcc, cxx: g++ }
            sanitizer: "Thread"

    runs-on: ${{ matrix.os }}

    env:
      BUILD_DIR: build

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && \
            sudo apt-get install -y \
            cmake \
            ninja-build \
            libomp-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja libomp
          
          OPENMP_PATH="$(brew --prefix)/opt/libomp"
          
          { 
            echo "OpenMP_ROOT=${OPENMP_PATH}"
            echo "LDFLAGS=$LDFLAGS -L${OpenMP_ROOT}/lib"
            echo "CFLAGS=-I${OPENMP_PATH}/include -Xpreprocessor -fopenmp ${CFLAGS}"
            echo "CXXFLAGS=-I${OPENMP_PATH}/include -Xpreprocessor -fopenmp ${CXXFLAGS}"
          } >> $GITHUB_ENV

      - name: Configure
        run: |
          cmake \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -S . \
            -B $BUILD_DIR \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSANITIZER="${{ matrix.sanitizer }}"

      - name: Build
        run: |
          cmake --build $BUILD_DIR --parallel

      - name: Test
        run: |
          if [ "${{ matrix.sanitizer }}" != "" ]; then
            export ASAN_OPTIONS=detect_leaks=1:abort_on_error=1
            export UBSAN_OPTIONS=halt_on_error=1
            export TSAN_OPTIONS='ignore_noninstrumented_modules=1 halt_on_error=1'
          fi
          ctest --test-dir $BUILD_DIR --output-on-failure
